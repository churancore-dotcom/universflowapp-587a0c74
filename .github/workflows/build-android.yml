name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger from GitHub
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Use production Capacitor config
        run: |
          cp capacitor.config.prod.ts capacitor.config.ts

      - name: Add Android platform
        run: npx cap add android

      - name: Integrate Android widgets
        run: |
          # Create widget package directory
          mkdir -p android/app/src/main/java/app/lovable/universflow
          
          # Copy Java widget files
          cp android-widgets/java/*.java android/app/src/main/java/app/lovable/universflow/
          
          # Copy drawable resources
          cp android-widgets/res/drawable/*.xml android/app/src/main/res/drawable/
          
          # Copy layout resources
          cp android-widgets/res/layout/*.xml android/app/src/main/res/layout/
          
          # Copy xml resources (widget info)
          mkdir -p android/app/src/main/res/xml
          cp android-widgets/res/xml/*.xml android/app/src/main/res/xml/
          
          # Copy string resources (merge with existing)
          cat android-widgets/res/values/strings_widgets.xml >> android/app/src/main/res/values/strings.xml
          # Fix the XML by removing duplicate closing tag
          sed -i 's/<\/resources><resources>//g' android/app/src/main/res/values/strings.xml
          sed -i '/<\/resources>/d' android/app/src/main/res/values/strings.xml
          echo '</resources>' >> android/app/src/main/res/values/strings.xml

      - name: Update AndroidManifest.xml for widgets
        run: |
          # Add widget receivers and service to AndroidManifest.xml
          sed -i 's/<\/application>/\
              <!-- Widget Receivers -->\
              <receiver android:name=".NowPlayingWidget" android:exported="false">\
                  <intent-filter>\
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" \/>\
                  <\/intent-filter>\
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml\/now_playing_widget_info" \/>\
              <\/receiver>\
              <receiver android:name=".FavoritesWidget" android:exported="false">\
                  <intent-filter>\
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" \/>\
                  <\/intent-filter>\
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml\/favorites_widget_info" \/>\
              <\/receiver>\
              <receiver android:name=".QuickActionsWidget" android:exported="false">\
                  <intent-filter>\
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" \/>\
                  <\/intent-filter>\
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml\/quick_actions_widget_info" \/>\
              <\/receiver>\
              <!-- Widget Update Service -->\
              <service android:name=".WidgetUpdateService" android:exported="false" \/>\
          <\/application>/g' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: universflow-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
